global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service-api:3000']

  - job_name: 'kitchen-service'
    static_configs:
      - targets: ['kitchen-service-api:3001']

  - job_name: 'krakend'
    static_configs:
      - targets: ['api-gateway:9091']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service-api:3002']

  - job_name: 'catalog-service'
    static_configs:
      - targets: ['catalog-service-api:3003']

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service-api:3004']
