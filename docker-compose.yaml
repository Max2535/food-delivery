version: '3.8'

x-tz: &tz
  TZ: Asia/Bangkok

services:
  db:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      <<: *tz
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./order-service
    container_name: order-service-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      <<: *tz
      PORT: 3000
      DB_URL: postgres://admin:admin@db:5432/order_db?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CONSUL_ADDRESS: consul:8500
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_started

  kitchen-api:
    build: ./kitchen-service
    container_name: kitchen-service-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      <<: *tz
      PORT: 3001
      DB_URL: postgres://admin:admin@db:5432/kitchen_db?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CONSUL_ADDRESS: consul:8500
      SERVICE_ADDRESS: kitchen-api
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_started
    command: ["./api"]

  kitchen-worker:
    build: ./kitchen-service
    container_name: kitchen-service-worker
    restart: always
    environment:
      <<: *tz
      PORT: 3001
      DB_URL: postgres://admin:admin@db:5432/kitchen_db?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["./worker"]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      <<: *tz
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  consul:
    image: hashicorp/consul:latest
    container_name: consul
    environment:
      <<: *tz
    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    command: "agent -dev -client=0.0.0.0"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    environment:
      <<: *tz
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3002:3000" # เข้าผ่าน Port 3002 (User/Pass: admin/admin)
    environment:
      <<: *tz
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DEFAULT_LOCALE: th-TH
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    environment:
      <<: *tz
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    environment:
      <<: *tz
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml

  inventory-api:
    build: ./inventory-service
    container_name: inventory-service-api
    restart: always
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - DB_URL=postgres://admin:admin@db:5432/inventory_db?sslmode=disable
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - CATALOG_SERVICE_URL=http://catalog-service-api:3003
    depends_on:
      - db
      - rabbitmq
      - catalog-service
    command: ["./api"]

  inventory-worker:
    build: ./inventory-service
    container_name: inventory-service-worker
    restart: always
    environment:
      - DB_URL=postgres://admin:admin@db:5432/inventory_db?sslmode=disable
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - CATALOG_SERVICE_URL=http://catalog-service-api:3003
    depends_on:
      - db
      - rabbitmq
      - catalog-service
    command: ["./worker"]

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service-api
    restart: always
    ports:
      - "3003:3003"
    environment:
      <<: *tz
      PORT: 3003
      DB_URL: postgres://admin:admin@db:5432/catalog_db?sslmode=disable
      REDIS_URL: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "8001:5540"
    environment:
      <<: *tz
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_ALIAS: Redis (Docker)
    depends_on:
      - redis

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    user: root
    environment:
      <<: *tz
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    entrypoint: >
      /bin/sh -c "
      chmod 600 /tmp/pgpassfile &&
      chown 5050:5050 /tmp/pgpassfile &&
      exec /entrypoint.sh
      "
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin_servers.json:/pgadmin4/servers.json
      - ./.pgpass:/tmp/pgpassfile
    depends_on:
      db:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    container_name: auth-service-api
    restart: always
    ports:
      - "3005:3002"
    environment:
      <<: *tz
      PORT: 3002
      DB_URL: postgres://admin:admin@db:5432/auth_db?sslmode=disable
      PRIVATE_KEY_PATH: /app/private_key.pem
    volumes:
      - ./private_key.pem:/app/private_key.pem
    depends_on:
      db:
        condition: service_healthy

  gateway:
    image: krakend:latest
    container_name: api-gateway
    environment:
      <<: *tz
    volumes:
      - ./krakend.json:/etc/krakend/krakend.json
      - ./public_key.pem:/etc/krakend/public_key.pem
      - ./public_key.json:/etc/krakend/public_key.json
    ports:
      - "8080:8080"
      - "9091:9091"
    depends_on:
      - api
      - kitchen-api
      - auth-service
      - catalog-service

  krakend-designer:
    image: devopsfaith/krakendesigner:latest
    container_name: krakend-designer
    environment:
      <<: *tz
    ports:
      - "8787:80"

volumes:
  postgres_data:
