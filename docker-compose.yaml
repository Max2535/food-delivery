version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: order-service-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./order-service
    container_name: order-service-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_URL=postgres://admin:admin@db:5432/order_db?sslmode=disable
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - db
      - rabbitmq

  kitchen-api:
    build: ./kitchen-service
    container_name: kitchen-service-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_URL=postgres://admin:admin@db:5432/kitchen_db?sslmode=disable
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - CONSUL_ADDRESS=consul:8500
      - SERVICE_ADDRESS=kitchen-api
    depends_on:
      - db
      - rabbitmq
      - consul
    command: ["./api"]

  kitchen-worker:
    build: ./kitchen-service
    container_name: kitchen-service-worker
    restart: always
    environment:
      - PORT=3001
      - DB_URL=postgres://admin:admin@db:5432/kitchen_db?sslmode=disable
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - db
      - rabbitmq
    command: ["./worker"]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  consul:
    image: hashicorp/consul:latest
    container_name: consul
    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    command: "agent -dev -client=0.0.0.0"

volumes:
  postgres_data:


