      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/model.KitchenStation'
              type: array
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get all kitchen stations
      tags:
      - stations
    post:
      consumes:
      - application/json
      description: Define a new kitchen station
      parameters:
      - description: Station Data
        in: body
        name: station
        required: true
        schema:
          $ref: '#/definitions/model.KitchenStation'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.KitchenStation'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create a kitchen station
      tags:
      - stations
